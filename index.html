<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
p{
	margin:0!important;
}

.ast-scroll-to-top, 
#ast-scroll-top {
    display: none !important;
}

.woocommerce-js h2{
	margin-bottom: 0!important;
}

/* CONTENEDOR */
.woocommerce-notices-wrapper {
    position: fixed;
    bottom: 30px;
    left: 24px;
    z-index: 9999;
    margin: 0;
    width: auto;
    max-width: 480px;
    pointer-events: none;
}

/* TOAST */
.woocommerce-message {
    position: relative;

    display: flex;
    align-items: center;
    gap: 14px;

    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

    border: 1px solid rgba(0,0,0,0.06);

    border-radius: 50px;

    padding: 10px 14px;

    box-shadow:
        0 10px 30px rgba(0,0,0,0.08),
        0 2px 10px rgba(0,0,0,0.04);

    animation: toastIn .35s ease;

    pointer-events: all;
}

/* QUITAR ESTILOS DEFAULT WOOCOMMERCE */
.woocommerce-message::before {
    display: none !important;
}

/* ICONO */
.woocommerce-message::after {
    content: "✓";
    width: 34px;
    height: 34px;
    min-width: 34px;

    display: flex;
    align-items: center;
    justify-content: center;

    background: #ecfdf3;
    color: #16a34a;

    border-radius: 999px;

    font-size: 16px;
    font-weight: 700;

    order: -1;
}

/* TEXTO */
.woocommerce-message {
    color: #111827;
    font-size: 12px;
    font-weight: 500;
    line-height: 1.5;
}

/* BOTON */
.woocommerce-message .button {
    margin-left: auto !important;
    background: #002bff !important;
    color: white !important;
    border: none;
    border-radius: 999px;
    padding: 8px 14px!important;
    font-size: 12px!important;
    font-weight: 600;
    text-decoration: none;
    transition: .2s ease;
    white-space: nowrap;
}

.woocommerce-message .button:hover {
    transform: translateY(-1px);
    opacity: .92;
}

/* ANIMACION */
@keyframes toastIn {
    from {
        opacity: 0;
        transform: translateY(-8px) scale(.98);
    }

    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

/* MOBILE */
@media (max-width: 768px) {

    .woocommerce-notices-wrapper {
        position: fixed;
        bottom: 30px;
        left: 24px;
        z-index: 9999;
        margin: 0;
        width: auto;
        max-width: 300px;
        pointer-events: none;
    }

    .woocommerce-message {
        flex-wrap: wrap;
        display: flex;
        justify-content: center;
        padding: 10px;
        border-radius: 10px;
        gap: 5px;
    }

    .woocommerce-message .button {
        width: 50%;
        text-align: center;
        margin-left: 0 !important;
        margin-top: 4px;
    }
}
    </style>
</head>
<body>
    <div class="woocommerce-notices-wrapper">
	<div class="woocommerce-message" role="alert" tabindex="-1">
		“Globo burbuja de 36″” se ha añadido a tu carrito. 
        <a href="https://bloomandco.ec/cart/" class="button wc-forward">Ver carrito</a>	
    </div>
</div>
</body>
</html>
